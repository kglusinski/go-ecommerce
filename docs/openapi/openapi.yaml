openapi: "3.0.0"
info:
  title: eCommerce API
  version: 0.1.0
  description: |
    **Go-ecommerce service**

  contact:
    name: Kamil Glusinski

servers:
  - url: http://localhost:8080
    description: Local testing

paths:
  "/heartbeat":
    get:
      operationId: heartbeat
      description: "Service health check"
      tags:
        - general
      responses:
        "200":
          description: "the server is alive"
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    description: "status of the server"
                    example: "ok"
  "/v1/products":
    post:
      operationId: createProduct
      description: "Create a new product"
      tags:
        - products
      security:
        - bearerAuth: [ ]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
        required: true
      responses:
        "201":
          description: "The product has been created"
          content:
            application/json:
              schema:
                properties:
                  id:
                    type: string
                    format: uuid
                    description: "newly created product identifier"
        "401":
          description: "Unauthorized"
          $ref: "#/components/responses/Error"
        "500":
          description: "Internal server error"
          $ref: "#/components/responses/Error"
  "/v1/products/{productID}":
    get:
      operationId: getSingleProduct
      description: "Get product details"
      tags:
        - products
      security:
        - bearerAuth: [ ]
      parameters:
        - name: productID
          in: path
          description: "product identifier"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "The product details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: "Unauthorized"
          $ref: "#/components/responses/Error"
        "404":
          description: "Product not found"
          $ref: "#/components/responses/Error"
        "500":
          description: "Internal server error"
          $ref: "#/components/responses/Error"
  "/v1/cart":
    post:
      operationId: createCart
      description: "Create a new cart"
      tags:
        - cart
      security:
        - bearerAuth: [ ]
      responses:
        "201":
          description: "The cart has been created"
          content:
            application/json:
              schema:
                properties:
                  id:
                    type: string
                    format: uuid
                    description: "newly created cart identifier"
        "401":
          description: "Unauthorized"
          $ref: "#/components/responses/Error"
        "500":
          description: "Internal server error"
          $ref: "#/components/responses/Error"
  "/v1/cart/{cartID}":
    get:
      operationId: getCart
      description: "Get cart details"
      tags:
        - cart
      security:
        - bearerAuth: [ ]
      parameters:
        - name: cartID
          in: path
          description: "cart identifier"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "The cart details"
          content:
            application/json:
              schema:
                properties:
                  id:
                    type: string
                    format: uuid
                    description: "cart identifier"
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "401":
          description: "Unauthorized"
          $ref: "#/components/responses/Error"
        "404":
          description: "Cart not found"
          $ref: "#/components/responses/Error"
        "500":
          description: "Internal server error"
          $ref: "#/components/responses/Error"
  "/v1/cart/{cartID}/items":
    post:
      summary: "Add product to cart"
      operationId: addProductToCart
      tags:
        - cart
      parameters:
        - name: cartID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              properties:
                productID:
                  type: string
                  format: uuid
                  description: "product identifier"
                amount:
                  type: number
                  format: float
                  description: "product amount"
                unit_price:
                  type: number
                  format: float
                  description: "product unit price"
      responses:
        "204":
          description: "Product has been added to cart"
        "401":
          description: "Unauthorized"
          $ref: "#/components/responses/Error"
        "500":
          description: "Internal server error"
          $ref: "#/components/responses/Error"
    patch:
      summary: "Remove product from cart"
      operationId: removeProductFromCart
      tags:
        - cart
      parameters:
        - name: cartID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: "Product has been removed from cart"
        "401":
          description: "Unauthorized"
          $ref: "#/components/responses/Error"
        "500":
          description: "Internal server error"
          $ref: "#/components/responses/Error"
components:
  schemas:
    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
          description: "Product name"
          example: "My new product"
        amount:
          type: number
          format: float
          description: "Product price"
          example: 1.0
        price:
          type: number
          format: float
          description: "Product price"
          example: 10.99
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: "form identifier"
        name:
          type: string
          description: "form name"
          example: "My form"
        amount:
          type: number
          format: float
          description: "Product price"
          example: 1.0
        price:
          type: number
          format: float
          description: "Product price"
          example: 10.99

  responses:
    Error:
      description: "Generic error response"
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                description: Error description
                type: string
                example: "Insufficient permissions to access this resource"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT